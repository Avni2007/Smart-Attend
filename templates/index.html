<!DOCTYPE html>
<html>
<head>
    <title>Smart Attendance Dashboard</title>

    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            color: white;
            text-align: center;
            overflow: hidden;

            /* Navy gradient */
            background: linear-gradient(135deg, #0a1f44, #102a5c);
        }

        h1 {
            margin-top: 20px;
            font-size: 34px;
            z-index: 2;
            position: relative;
        }

        .container {
            margin-top: 30px;
            position: relative;
            z-index: 2;
        }

        /* Card */
        .card {
            background: white;
            color: black;
            padding: 20px;
            border-radius: 12px;
            display: inline-block;
            box-shadow: 0px 8px 25px rgba(0,0,0,0.3);
        }

        img {
            border-radius: 10px;
            border: 2px solid #ccc;
        }

        .info {
            margin-top: 15px;
            font-size: 16px;
            color: #555;
        }

        .status {
            margin-top: 10px;
            font-weight: bold;
            color: #0a1f44;
        }

        /* LIVE dot */
        .live {
            color: red;
            font-weight: bold;
            animation: blink 1s infinite;
        }

        @keyframes blink {
            50% { opacity: 0; }
        }

        /* ✅ Floating Checkmarks Animation */
        .check {
            position: absolute;
            color: rgba(0, 255, 150, 0.15);
            font-size: 30px;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% {
                transform: translateY(100vh);
                opacity: 0;
            }
            20% { opacity: 1; }
            100% {
                transform: translateY(-10vh);
                opacity: 0;
            }
        }

        /* Glow pulse */
        .pulse {
            position: absolute;
            width: 300px;
            height: 300px;
            background: rgba(0, 255, 150, 0.1);
            border-radius: 50%;
            animation: pulseAnim 4s infinite;
            z-index: 1;
        }

        @keyframes pulseAnim {
            0% { transform: scale(0.8); opacity: 0.4; }
            50% { transform: scale(1.2); opacity: 0.2; }
            100% { transform: scale(0.8); opacity: 0.4; }
        }

        /* Popup */
        #popup {
            opacity: 0;
            position: fixed;
            top: 25%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #0a1f44;
            padding: 25px 40px;
            border-radius: 10px;
            font-size: 20px;
            box-shadow: 0px 0px 20px rgba(0,0,0,0.4);
            transition: 0.5s;
        }

        #popup.show {
            opacity: 1;
        }

        .footer {
            margin-top: 20px;
            font-size: 14px;
            opacity: 0.8;
            position: relative;
            z-index: 2;
        }
    </style>
</head>

<body>

    <!-- Glow animation -->
    <div class="pulse" style="top:20%; left:10%;"></div>
    <div class="pulse" style="top:60%; left:70%;"></div>

    <h1>🎯 Smart Attendance System</h1>

    <div class="container">
        <div class="card">

            <p><span class="live">● LIVE</span> Camera Feed</p>

            <img src="{{ url_for('video_feed') }}" width="640" height="480">

           

            <div class="status">
                👁 Blink to verify & mark attendance
            </div>

        </div>
    </div>

    <!-- Popup -->
    <div id="popup"></div>

    <!-- Floating Checkmarks Script -->
    <script>
        for (let i = 0; i < 15; i++) {
            let check = document.createElement("div");
            check.className = "check";
            check.innerHTML = "✔";
            check.style.left = Math.random() * 100 + "vw";
            check.style.animationDuration = (5 + Math.random() * 5) + "s";
            check.style.fontSize = (20 + Math.random() * 30) + "px";
            document.body.appendChild(check);
        }
    </script>

    <!-- Popup Script -->
    <script>
        function checkPopup() {
            fetch('/check_popup')
                .then(res => res.text())
                .then(data => {
                    if (data !== "none") {
                        let popup = document.getElementById("popup");

                        popup.innerHTML = "✅ " + data + " marked present!";
                        popup.classList.add("show");

                        setTimeout(() => {
                            popup.classList.remove("show");
                        }, 3000);
                    }
                });
        }

        setInterval(checkPopup, 2000);
    </script>

    <div class="footer">
        AI-Based Attendance System | Face Recognition + Blink Detection
    </div>

</body>
</html>
